<div class="perfil-container">
  <div class="profile-card">
    
    <div class="profile-header">
      <div class="avatar-container" *ngIf="user">
        <span class="avatar-text">{{ user.nombre.charAt(0) | uppercase }}</span>
      </div>
    </div>

    <div class="profile-body" *ngIf="user">
      <h2 class="user-name">{{ user.nombre }}</h2>
      <p class="user-email">✉️ {{ user.email }}</p>
      
      <div class="badge">Nivel: Viajero Explorador 🌍</div>

      <div class="info-section">
        <div class="info-item">
          <span class="label">Rol en la plataforma</span>
          <span class="value">{{ user.rol | titlecase }}</span>
        </div>
      </div>

      <div class="actions">
        <button class="btn-primary">Mis Viajes</button>
        <button class="btn-secondary">Editar Perfil</button>
      </div>
    </div>

  </div>
</div>
