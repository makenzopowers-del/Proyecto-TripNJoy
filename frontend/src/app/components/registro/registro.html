<link rel="stylesheet" href="./registro.css">
<div class="auth-container">
  <div class="glass-panel">
    <div class="auth-header">
      <img src="/logo-bola.png" alt="Trip N' Joy" class="auth-logo">
      <h2>Crea tu cuenta</h2>
      <p>Comienza tu próxima gran aventura hoy mismo</p>
    </div>

    <form class="auth-form" [formGroup]="registroForm" (ngSubmit)="onSubmit()">
      <div class="form-row">
        <div class="input-group">
          <label for="nombre">Nombre</label>
          <div class="input-wrapper">
            <i>👤</i>
            <input type="text" id="nombre" formControlName="nombre" placeholder="Tu nombre">
          </div>
        </div>
        <div class="input-group">
          <label for="apellidos">Apellidos</label>
          <div class="input-wrapper">
            <input type="text" id="apellidos" formControlName="apellidos" placeholder="Tus apellidos">
          </div>
        </div>
      </div>

      <div class="input-group">
        <label for="email">Correo electrónico</label>
        <div class="input-wrapper">
          <i>✉️</i>
          <input type="email" id="email" formControlName="email" placeholder="viajero@ejemplo.com">
        </div>
      </div>

      <div class="input-group">
        <label for="password">Contraseña</label>
        <div class="input-wrapper">
          <i>🔒</i>
          <input type="password" id="password" formControlName="password" placeholder="Mínimo 8 caracteres">
        </div>
      </div>

      <div class="input-group">
        <label for="confirmPassword">Confirmar Contraseña</label>
        <div class="input-wrapper">
          <i>🔐</i>
          <input type="password" id="confirmPassword" formControlName="confirmPassword" placeholder="Repite tu contraseña">
        </div>
        
        @if (registroForm.hasError('passwordsMismatch') && registroForm.get('confirmPassword')?.touched) {
          <span class="error-msg">⚠️ Las contraseñas no coinciden</span>
        }
      </div>

      <div class="checkbox-group">
        <input type="checkbox" id="terms" formControlName="terms">
        <label for="terms">Acepto los <a href="#">Términos y Condiciones</a> y la <a href="#">Política de Privacidad</a></label>
      </div>

      <button type="submit" class="btn-primary" [disabled]="registroForm.invalid" [class.btn-disabled]="registroForm.invalid">
        Registrarme
      </button>
    </form>

    <div class="auth-footer" style="text-align: center; margin-top: 20px; font-size: 0.9rem; color: #fff;">
        <p>¿Ya tienes una cuenta? <a href="/login" style="color: #00b4d8; text-decoration: none; font-weight: bold;">Inicia sesión</a></p>
    </div>

  </div>
</div>
