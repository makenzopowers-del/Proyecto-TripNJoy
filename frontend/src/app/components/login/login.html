<link rel="stylesheet" href="./login.css">

<div class="modal-overlay">
  
  <div class="modal-box dark-theme">
    
    <button class="close-btn" (click)="onCerrarClick()">✕</button>


    <div class="auth-header">
      <img src="/logo-bola.png" alt="Trip N' Joy" class="auth-logo">
      <h2 class="auth-title">Iniciar Sesión</h2>
      <p class="auth-subtitle">Bienvenido de nuevo a tu próxima aventura</p>
    </div>

    <form class="auth-form">
      <div class="input-group">
        <label for="email">Correo electrónico</label>
        <div class="input-wrapper">
          <span class="icon">✉</span>
          <input type="email" id="email" name="email" [(ngModel)]="email" placeholder="viajero@ejemplo.com" required>
        </div>
      </div>

      <div class="input-group">
        <label for="password">Contraseña</label>
        <div class="input-wrapper">
          <span class="icon">🔒</span>
          <input type="password" id="password" name="password" [(ngModel)]="password" placeholder="********" required>
        </div>
        <div class="forgot-pwd-container">
          <a href="#" class="forgot-password">¿Olvidaste tu contraseña?</a>
        </div>
      </div>

      <button type="button" class="btn-primary" (click)="onEntrar()">Entrar</button>

      <div class="social-divider">
        <span>O</span>
      </div>
      
      <!-- Botón de inicio de sesión con Google -->

      <div id="googleBtn"></div>

    </form>

    <div class="auth-footer">
      <p>¿No tienes una cuenta? <a routerLink="/registro" (click)="onCerrarClick()" style="cursor: pointer;">Regístrate aquí</a></p>
    </div>

  </div>
</div>
